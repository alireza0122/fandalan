<owl-carousel-o [options]=" customOptions">

  @for (product of products(); track product.id) {


    <ng-template carouselSlide>
      <div class="home-product  ">
        <div class="home-product-title">
        </div>
        <div class="home-product-list">
          <div class="home-product-list-item">
            <div class="home-product-list-item-image">
              <img class="home-product-list-item-image-img"
                   [src]="product.image"
                   [alt]="product.title">
            </div>
            <div class="home-product-list-item-body p-4 d-flex flex-column justify-content-between  ">
              <p class="home-product-list-item-body-subtitle fw-bold fs-14px"> .{{ product.subtitle }} </p>
              <h4 class="home-product-list-item-body-title mb-4 fs-16px text-over o2 fw-bold">{{ product.title }}</h4>
              <h4 class=" home-product-list-item-body-h4 p-2 px-3 mb-2 text-over o1 fs-16px ">{{ product.category }}</h4>
            </div>
            <div class="home-product-list-item-footer p-4 pt-4 mt-2">
              <div class="d-flex justify-content-between align-items-center">
                <h4 class="home-product-list-item-footer-boxText p-2 fs-14px C ">
                  غیر دیجیتال
                </h4>
                <i class="fa-solid fa-arrow-left home-product-list-item-footer-icon p-2 "></i>
              </div>
            </div>
          </div>
        </div>
      </div>
    </ng-template>


  }

</owl-carousel-o>
