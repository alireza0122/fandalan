        <div class="z-3 text-center d-flex justify-content-center align-items-center flex-column">
          <h4 class="fs-18px h4 fw-bold  my1">خلاق پکیج</h4>
          <h4 class="fs-32px fw-bold   my1">بسته‌های خلاقانه چندمحصولی</h4>
          <p class="text-color fs-16px my1">
            در این بخش چند محصول یا خدمت خلاقانه به صورت پکیج جمع‌آوری شده و شرایط دریافت آن با جزئیات توضیح داده شده است.
          </p>
        </div>

      </div>
    </div>
    <div class="col-12 mt-5">
      <owl-carousel-o [options]="customOptions">

        @for (item of slides; track item) {
          <ng-template carouselSlide>
            @if (item.title) {
              <div class="home-packages p-2 pt-4">
                <div class="home-packages-title">
                </div>
                <div class="home-packages-list">
                  <div class="home-packages-list-item p-2">
                    <div class="home-packages-list-item-image">
                      <img class="home-packages-list-item-image-img"
                           [src]="item.urlImg"
                           [alt]="item.title">
                    </div>
                    <div class="home-packages-list-item-body p-2">
                      <div class="d-flex justify-content-between align-items-center my-2">
                        <div class="d-flex ">
                          <img class="home-packages-list-item-body-icon"
                               [src]="item.icon"
                               [alt]="item.title">
                          <span class="color fs-14px fw-bold"> بسته ویژه </span>
                        </div>

                        <p class="fs-14px m-0">{{item.qty }}</p>
                      </div>
                      <h4 class="fs-16px">
                        {{item.title}}
                      </h4>
                    </div>
                    <div class="home-packages-list-item-footer">

                    </div>
                  </div>
                </div>
              </div>
            }
          </ng-template>
        }

      </owl-carousel-o>

    </div>
    <div class="col-12 my-2">
      <div class="d-flex justify-content-center">
        <button class="btn-All p-2 gap-3 fw-bold">
          مشاهده هـمه
          <i class="fa-solid fa-angle-left all-product-icon p-2 "></i>
        </button>
      </div>
    </div>
  </div>
</div>
